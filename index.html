<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Quality Gauge</title>
  <link rel="stylesheet" href="style.css">
  <script src="vendor/tableau.extensions.1.latest.js"></script>
</head>
<body>

<!-- Empty state (shown when fields are not yet mapped) -->
<div id="empty-state" hidden></div>

<!-- ── Main gauge view ──────────────────────────────────────────────────── -->
<div class="gauge-wrapper" id="gauge-wrapper">

  <!--
    SVG viewport : 300 × 215
    Arc centre   : (150, 185)  |  Radius: 125  |  Stroke-width: 22
    Circumference: π × 125 ≈ 392.70
    Path (sweep-flag=1 → dome ∩ shape):  M 25 185 A 125 125 0 0 1 275 185
  -->
  <svg id="gauge-svg" viewBox="0 0 300 215" xmlns="http://www.w3.org/2000/svg">

    <!-- Background (gray) track -->
    <path
      d="M 25 185 A 125 125 0 0 1 275 185"
      fill="none"
      stroke="#E8E8E8"
      stroke-width="22"
      stroke-linecap="round"
    />

    <!-- Filled arc — updated dynamically via stroke-dasharray -->
    <path
      id="fill-arc"
      d="M 25 185 A 125 125 0 0 1 275 185"
      fill="none"
      stroke="#E05C5C"
      stroke-width="22"
      stroke-linecap="round"
      stroke-dasharray="0 392.70"
    />

    <!-- Percentage value -->
    <text id="pct-text" x="150" y="148"
      text-anchor="middle" font-size="42" font-weight="700" fill="#E05C5C"
    >—</text>

    <!-- "invalid rate" label -->
    <text id="rate-label" x="150" y="167"
      text-anchor="middle" font-size="13" fill="#ADADAD"
    >invalid rate</text>

    <!-- Threshold needle (radial tick line) -->
    <line
      id="threshold-needle"
      x1="150" y1="185" x2="150" y2="185"
      stroke="#444" stroke-width="2.5" stroke-linecap="round"
      visibility="hidden"
    />

    <!-- Dot at needle / arc intersection -->
    <circle
      id="threshold-dot"
      cx="150" cy="185" r="3.5"
      fill="#444" visibility="hidden"
    />

    <!-- Threshold value label outside the arc -->
    <text
      id="threshold-label"
      x="150" y="60"
      text-anchor="middle" font-size="11" font-weight="600" fill="#555"
      visibility="hidden"
    >—</text>

  </svg>

  <!-- Stats row -->
  <div class="stats-row">
    <span class="stat-item">Total:&nbsp;<strong id="total-val">—</strong></span>
    <span class="stat-item">Invalid:&nbsp;<strong id="invalid-val">—</strong></span>
  </div>

</div>

<script src="extension.js"></script>
</body>
</html>
